<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Analysis Tool</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>📈 Stock Analysis Tool</h1>
    <div class="api-key-box">
      <input type="password" id="apiKeyInput" placeholder="Alpha Vantage API key" />
      <button id="saveKeyBtn">Save Key</button>
      <a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener">Get free key</a>
    </div>
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="tickerInput" placeholder="Enter ticker symbol (e.g. AAPL)" />
      <button id="searchBtn">Analyze</button>
      <button id="compareBtn">Add to Compare</button>
      <span id="status"></span>
    </section>

    <section class="stats-section" id="statsSection" hidden>
      <div class="stat-card">
        <span class="label">Price</span>
        <span class="value" id="statPrice">--</span>
      </div>
      <div class="stat-card">
        <span class="label">Change</span>
        <span class="value" id="statChange">--</span>
      </div>
      <div class="stat-card">
        <span class="label">52-Week High</span>
        <span class="value" id="stat52High">--</span>
      </div>
      <div class="stat-card">
        <span class="label">52-Week Low</span>
        <span class="value" id="stat52Low">--</span>
      </div>
      <div class="stat-card">
        <span class="label">Latest Volume</span>
        <span class="value" id="statVolume">--</span>
      </div>
    </section>

    <section class="chart-controls">
      <label><input type="checkbox" id="smaToggle" /> Show 50-day SMA</label>
      <label><input type="checkbox" id="sma200Toggle" /> Show 200-day SMA</label>
    </section>

    <section class="chart-section">
      <canvas id="priceChart"></canvas>
    </section>

    <section class="compare-section">
      <h2>Comparison (Normalized % Change)</h2>
      <div id="compareList" class="compare-list"></div>
      <canvas id="compareChart"></canvas>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="app.js"></script>
</body>
</html>
